    <text class="cls-7" transform="translate(38 189)"><tspan class="cls-30" x="0" y="0">HLEDÁME</tspan><tspan class="cls-27" x="105.39" y="0"> </tspan><tspan class="cls-30" x="110.21" y="0">AU</tspan><tspan class="cls-34" x="141.02" y="0">T</tspan><tspan class="cls-30" x="153.58" y="0">O</tspan><tspan class="cls-27" x="170.21" y="0">R</tspan><tspan class="cls-33" x="184.81" y="0">Y</tspan><tspan class="cls-30" x="198.61" y="0" xml:space="preserve"> PRO KOLEKTIVNÍ VÝS</tspan><tspan class="cls-25" x="432.68" y="0">TA</tspan><tspan class="cls-30" x="457.79" y="0">VU</tspan></text>
    <text class="cls-7" transform="translate(39 217)"><tspan class="cls-30" x="0" y="0">V PRAŽSKÝCH TRAM</tspan><tspan class="cls-25" x="219.59" y="0">V</tspan><tspan class="cls-30" x="232.16" y="0">AJOVÝCH ZASTÁVKÁCH.</tspan></text>
