  <g id="intro-text">
    <rect class="cls-24" x="1.34" y="269.82" width="595" height="80"/>
    <text class="cls-13" transform="translate(40.34 282.45)"><tspan x="0" y="0">Galerie Označník je galerie současného umění, jejíž výstavní prostory jsou prázdné reklamní</tspan></text>
    <text class="cls-13" transform="translate(40.34 296.45)"><tspan x="0" y="0">označníky pražských tramvajových zastávkek. Každý úsek linky je samostatná výstava.</tspan></text>
    <text class="cls-13" transform="translate(40.34 314.45)"><tspan x="0" y="0">Chystáme další výstavu a hledáme autor</tspan><tspan class="cls-26" x="162.58" y="0">y</tspan><tspan x="166.42" y="0">, kteří chtějí vystavit ve veřejném prostoru.</tspan></text>
    <text class="cls-13" transform="translate(40.34 328.45)"><tspan x="0" y="0">Bez galerie, bez white cube, bez poplatků. </tspan><tspan class="cls-32" x="171.11" y="0">V</tspan><tspan x="176.62" y="0">ernisáž by probíhala formou aktivní instalace.</tspan></text>
  </g>
  <g id="black-bar-3">
    <rect x="1" y="365" width="596.37" height="14"/>
  </g>
  <g id="row-01">
    <rect class="cls-24" x="1" y="382" width="595" height="96.29"/>
    <line class="cls-16" x1="39.75" y1="379" x2="39.75" y2="475.29"/>
    <text class="cls-4" transform="translate(5.3 403.84)"><tspan x="0" y="0">01</tspan></text>
    <text class="cls-2" transform="translate(44 389.38)"><tspan x="0" y="0">CO HLEDÁME</tspan></text>
    <text class="cls-13" transform="translate(43.86 403.84)"><tspan x="0" y="0">Autory pro kolektivní výstavu v pražských tramvajových zastávkách. Každý</tspan></text>
    <text class="cls-13" transform="translate(43.86 417.84)"><tspan x="0" y="0">autor dostane blok zastávek na jedné lince. Díla budou vystavena v</tspan></text>
    <text class="cls-13" transform="translate(43.86 431.84)"><tspan x="0" y="0">reklamních rámečcích, za sklem, přímo v ulici.</tspan></text>
  </g>
  <g id="row-02">
    <rect class="cls-24" x="1" y="446.29" width="595" height="82"/>
    <line class="cls-16" x1="1" y1="446.29" x2="596" y2="446.29"/>
    <line class="cls-16" x1="39.75" y1="443.29" x2="39.75" y2="525.29"/>
    <text class="cls-4" transform="translate(1 472.81)"><tspan x="0" y="0">02</tspan></text>
    <text class="cls-2" transform="translate(43.86 457.84)"><tspan x="0" y="0">FORMÁT</tspan></text>
    <text class="cls-13" transform="translate(43.86 470.84)"><tspan x="0" y="0">Papí</tspan><tspan class="cls-32" x="18.51" y="0">r</tspan><tspan x="21.02" y="0">, formát</tspan><tspan class="cls-32" x="51.53" y="0"> </tspan><tspan x="53.53" y="0">A3 .</tspan></text>
    <text class="cls-13" transform="translate(43.86 484.84)"><tspan x="0" y="0">Série, variace, nebo pokaždé něco jiného. Dodáte hotové tisk</tspan><tspan class="cls-26" x="244.66" y="0">y</tspan><tspan x="248.49" y="0">,</tspan></text>
    <text class="cls-13" transform="translate(43.86 498.84)"><tspan x="0" y="0">nainstalujeme je společně.</tspan></text>
  </g>
  <g id="row-03">
    <rect class="cls-24" x="1" y="528.29" width="595" height="68"/>
    <line class="cls-16" x1="1" y1="528.29" x2="596" y2="528.29"/>
    <line class="cls-16" x1="39.75" y1="525.29" x2="39.75" y2="593.29"/>
    <text class="cls-4" transform="translate(1 554.23)"><tspan x="0" y="0">03</tspan></text>
    <text class="cls-9" transform="translate(43.86 539.84)"><tspan class="cls-15" x="0" y="0">INS</tspan><tspan class="cls-36" x="27.2" y="0">T</tspan><tspan class="cls-15" x="36.05" y="0">ALACE</tspan></text>
    <text class="cls-13" transform="translate(43.86 552.84)"><tspan x="0" y="0">Společná vernisáž. Projdeme trasu a každý nainstaluje svá díla do označníků.</tspan></text>
    <text class="cls-13" transform="translate(44 565.71)"><tspan x="0" y="0">Datum a trasa budou upřesněn</tspan><tspan class="cls-26" x="124.08" y="0">y</tspan><tspan x="127.92" y="0">.</tspan></text>
  </g>
  <g id="row-04">
    <rect class="cls-24" x="1" y="596.29" width="595" height="68"/>
    <line class="cls-16" x1="1" y1="596.29" x2="596" y2="596.29"/>
    <line class="cls-16" x1="39.75" y1="593.29" x2="39.75" y2="661.29"/>
    <text class="cls-4" transform="translate(1 621.59)"><tspan x="0" y="0">04</tspan></text>
    <text class="cls-2" transform="translate(43.86 607.84)"><tspan x="0" y="0">ŽIVOTNOST</tspan></text>
    <text class="cls-13" transform="translate(43.86 620.84)"><tspan x="0" y="0">Přibližně týden. Výstavu sundá DP</tspan><tspan class="cls-28" x="138.07" y="0">P</tspan><tspan x="142.91" y="0">.</tspan><tspan class="cls-31" x="145.42" y="0"> </tspan><tspan class="cls-29" x="147.76" y="0">T</tspan><tspan x="152.26" y="0">o je součást konceptu.</tspan></text>
    <text class="cls-13" transform="translate(43.86 634.84)"><tspan x="0" y="0">Díla žijí ve veřejném prostoru a sdílejí jeho osud.</tspan></text>
  </g>
