    <text class="cls-13" transform="translate(39.68 693.2)"><tspan x="0" y="0">Pošlete nám: jméno nebo pseudonym, náhled díla nebo série, kolik zastávek chcete obsadit.</tspan></text>
    <text class="cls-13" transform="translate(39.68 707.2)"><tspan x="0" y="0">Nemusíte mít hotová díla, stačí záměr a ukázka.</tspan></text>
    <text class="cls-3" transform="translate(39.68 733.2)"><tspan x="0" y="0">GalerieOznacnik@protonmail.com</tspan></text>
